<!DOCTYPE html>
<html>
<head>

<title>URL Shortener</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-xl w-[750px] p-10">

<h1 class="text-3xl font-bold text-center mb-2">🔗 URL Shortener</h1>

<p class="text-gray-500 text-center mb-6">
Create short and shareable links instantly
</p>

<div class="flex gap-3">

<input
id="url"
placeholder="Paste your long URL here"
class="flex-1 border rounded-lg p-3 outline-none"
/>

<button
onclick="shorten()"
class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700"
>
Shorten
</button>

</div>

<div id="result" class="mt-6 text-center"></div>

<table class="mt-8 w-full text-sm">

<thead class="text-gray-600">

<tr>
<th class="text-left pb-3">Short URL</th>
<th class="text-left pb-3">Clicks</th>
<th class="text-left pb-3">Copy</th>
</tr>

</thead>

<tbody id="links"></tbody>

</table>

</div>

<script>

async function shorten(){

const url=document.getElementById("url").value;

const res=await fetch("/api/shorten",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({originalUrl:url})

});

const data=await res.json();

document.getElementById("result").innerHTML=

`<a class="text-blue-600 font-medium" href="${data.shortUrl}" target="_blank">
${data.shortUrl}
</a>`;

loadLinks();

}

function copy(link){

navigator.clipboard.writeText(link);

}

async function loadLinks(){

const res=await fetch("/api/urls/all");

const data=await res.json();

const table=document.getElementById("links");

table.innerHTML="";

data.forEach(url=>{

const shortUrl=window.location.origin+"/"+url.shortId;

table.innerHTML+=`

<tr class="border-t">

<td class="py-3">
<a class="text-blue-600" href="${shortUrl}" target="_blank">
${shortUrl}
</a>
</td>

<td>${url.clicks}</td>

<td>
<button
class="bg-green-500 text-white px-3 py-1 rounded"
onclick="copy('${shortUrl}')"
>
Copy
</button>
</td>

</tr>

`;

});

}

loadLinks();

</script>

</body>
</html>
