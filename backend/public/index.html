<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shortify - URL Shortener</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background: linear-gradient(135deg,#3b82f6,#8b5cf6);

padding:20px;

}

/* wrapper */

.wrapper{

width:100%;
max-width:900px;

padding:20px;

background: rgba(255,255,255,0.15);

border-radius:20px;

backdrop-filter: blur(12px);

box-shadow:0 30px 80px rgba(0,0,0,0.25);

}

/* top bar */

.topbar{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:30px;

color:white;

}

.logo{

font-weight:600;
font-size:20px;

}

/* card */

.card{

background:white;
padding:30px;
border-radius:16px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.15);

}

.card h1{

margin-bottom:10px;
font-size:26px;

}

.subtitle{

color:#6b7280;
margin-bottom:25px;

}

/* input group */

.input-group{

display:flex;
gap:10px;
margin-bottom:25px;
flex-wrap:wrap;

}

input{

flex:1;
min-width:200px;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;

}

/* buttons */

button{

border:none;
padding:14px 20px;
border-radius:8px;
cursor:pointer;
font-weight:500;

}

.primary{

background:#2563eb;
color:white;

}

.primary:hover{

background:#1e40af;

}

.copy{

background:#10b981;
color:white;

}

/* result */

.result-box{

display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#f3f4f6;
border-radius:10px;
margin-bottom:25px;
flex-wrap:wrap;
gap:10px;

}

.result-box a{

color:#2563eb;
word-break:break-all;
text-decoration:none;

}

/* table */

table{

width:100%;
border-collapse:collapse;

}

th,td{

padding:12px;
border-bottom:1px solid #eee;
text-align:center;
font-size:14px;

}

th{

color:#6b7280;

}

/* toast */

#toast{

position:fixed;
bottom:20px;
right:20px;

background:#111;
color:white;
padding:12px 18px;
border-radius:8px;
font-size:14px;
opacity:0;
transform:translateY(20px);
transition:all 0.3s ease;

}

#toast.show{

opacity:1;
transform:translateY(0);

}

/* mobile responsive */

@media (max-width:600px){

.card{

padding:20px;

}

.input-group{

flex-direction:column;

}

button{

width:100%;

}

.result-box{

flex-direction:column;
align-items:flex-start;

}

table{

font-size:12px;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="topbar">

<div class="logo">🔗 Shortify</div>

<div>☰</div>

</div>

<div class="card">

<h1>Shorten Your Long URLs</h1>

<p class="subtitle">
Create short and shareable links instantly
</p>

<div class="input-group">

<input id="url" placeholder="Paste your long URL here">

<button class="primary" onclick="shorten()">Shorten</button>

</div>

<div id="result"></div>

<table>

<thead>

<tr>
<th>Short URL</th>
<th>Clicks</th>
<th>Copy</th>
</tr>

</thead>

<tbody id="links"></tbody>

</table>

</div>

</div>

<div id="toast">Copied!</div>

<script>

async function shorten(){

const url=document.getElementById("url").value;

if(!url){

alert("Enter URL");

return;

}

const res=await fetch("/api/shorten",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({originalUrl:url})

});

const data=await res.json();

document.getElementById("result").innerHTML=

`<div class="result-box">

<a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>

<button class="copy" onclick="copy('${data.shortUrl}')">Copy</button>

</div>`;

loadLinks();

}

function copy(link){

navigator.clipboard.writeText(link);

const toast=document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},2000);

}

async function loadLinks(){

const res=await fetch("/api/urls/all");

const data=await res.json();

const table=document.getElementById("links");

table.innerHTML="";

data.forEach(url=>{

const shortUrl=window.location.origin+"/"+url.shortId;

table.innerHTML+=`

<tr>

<td>
<a href="${shortUrl}" target="_blank">${shortUrl}</a>
</td>

<td>${url.clicks}</td>

<td>
<button class="copy" onclick="copy('${shortUrl}')">
Copy
</button>
</td>

</tr>

`;

});

}

loadLinks();

</script>

</body>
</html>
